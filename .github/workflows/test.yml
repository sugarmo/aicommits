name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            allow_failure: false
          - os: windows-latest
            allow_failure: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: npm

    - name: Align npm version
      run: npm install --global npm@11.11.1

    - name: Install dependencies
      run: npm install --loglevel verbose

    - name: Print npm debug log (Linux)
      if: failure() && runner.os == 'Linux'
      run: |
        latest_log="$(ls -t /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null | head -n 1)"
        if [ -n "$latest_log" ]; then
          cat "$latest_log"
        else
          echo "No npm debug log found."
        fi

    - name: Print npm debug log (Windows)
      if: failure() && runner.os == 'Windows'
      shell: pwsh
      run: |
        $paths = @(
          "$env:LOCALAPPDATA\npm-cache\_logs\*-debug-0.log",
          "C:\npm\cache\_logs\*-debug-0.log"
        )
        $latestLog = Get-ChildItem -Path $paths -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1

        if ($null -ne $latestLog) {
          Get-Content -Path $latestLog.FullName -Raw
        }
        else {
          Write-Host 'No npm debug log found.'
        }

    - name: Type check
      run: npm run type-check

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Install tinyproxy
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get install tinyproxy
        tinyproxy
    - name: Test
      env:
        AICOMMITS_TEST_API_KEY: ${{ secrets.AICOMMITS_TEST_API_KEY }}
        AICOMMITS_TEST_BASE_URL: ${{ secrets.AICOMMITS_TEST_BASE_URL }}
        AICOMMITS_TEST_MODEL: ${{ secrets.AICOMMITS_TEST_MODEL }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      run: npm test
